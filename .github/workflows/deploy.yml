name: CI/CD → Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FB_API_KEY:       ${{ secrets.VITE_FB_API_KEY }}
          VITE_FB_AUTH_DOMAIN:   ${{ secrets.VITE_FB_AUTH_DOMAIN }}
          VITE_FB_DATABASE_URL:  ${{ secrets.VITE_FB_DATABASE_URL }}
          VITE_FB_PROJECT_ID:    ${{ secrets.VITE_FB_PROJECT_ID }}
          VITE_FB_APP_ID:        ${{ secrets.VITE_FB_APP_ID }}

      # Production deploy — only on push to main
      - name: Deploy to Vercel (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Preview deploy — on pull requests
      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        id: preview
        run: |
          url=$(npx vercel --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Post preview URL as PR comment
      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚽ **Preview deployed:** ${{ steps.preview.outputs.url }}`
            })
